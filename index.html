<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aktivitas Harian Tim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b27;--card:#1e2540;--card2:#252d4a;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e6edf3;--muted:rgba(255,255,255,.45);--muted2:rgba(255,255,255,.65);
  --accent:#4f6ef7;--accent2:#6384ff;--green:#1D9E75;--green2:#5fd4a8;
  --yellow:#d4a017;--yellow2:#f4cc5a;--red:#c0392b;--red2:#e87070;
  --input-bg:#1a2035;--radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.shell{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;background:rgba(79,110,247,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.hdr-title{font-size:20px;font-weight:700;color:#fff}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:2px}
.nav{display:flex;gap:6px}
.nav-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--muted2);transition:all .2s;font-family:inherit}
.nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-btn.active{background:rgba(79,110,247,.15);border-color:var(--accent);color:#fff}
.main{padding:28px;max-width:820px;margin:0 auto;width:100%}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}
.field label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;font-weight:500}
.req{color:#e87070;margin-left:2px}
.field select,.field input[type=text],.field input[type=date],.field input[type=number],.field textarea{
  width:100%;background:var(--input-bg);border:1.5px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;padding:11px 14px;outline:none;
  transition:border-color .2s;font-family:inherit
}
.field select:focus,.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:90px;line-height:1.55}
.mt{margin-top:14px}
.btn-submit{width:100%;background:linear-gradient(135deg,#4f6ef7,#6384ff);border:none;color:#fff;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;margin-top:4px;letter-spacing:.2px}
.btn-submit:hover{opacity:.88}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.error{background:#c0392b}
.cfg-notice{background:rgba(79,110,247,.08);border:1px solid rgba(79,110,247,.2);border-radius:var(--radius-sm);padding:14px 18px;font-size:13px;color:var(--muted2);margin-bottom:18px;line-height:1.6}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">
<header class="hdr">
  <div class="hdr-left">
    <div class="logo">📋</div>
    <div>
      <div class="hdr-title">Aktivitas Harian Tim</div>
      <div class="hdr-sub">Sistem Pelaporan Real-Time</div>
    </div>
  </div>
</header>

<main class="main" id="view-form">
  <div class="cfg-notice">
    ⚙️ <strong>Status:</strong> Pastikan URL Apps Script sudah benar di bagian bawah kode.
  </div>

  <div class="card">
    <div class="card-title">Identitas</div>
    <div class="form-grid" style="margin-top:16px">
      <div class="field">
        <label>Nama Staff <span class="req">*</span></label>
        <select id="f-nama">
            <option value="">Pilih nama staff</option>
            <option>Bella Sintia</option>
            <option>Irfandi Nyondri</option>
            <option>Kasmira</option>
            <option>Salma</option>
        </select>
      </div>
      <div class="field">
        <label>Tanggal</label>
        <input type="date" id="f-tgl"/>
      </div>
    </div>
    <div class="field mt">
      <label>Status Kehadiran <span class="req">*</span></label>
      <select id="f-status">
        <option value="">Pilih status kehadiran</option>
        <option>Hadir di kantor</option>
        <option>WFH dengan izin Manager</option>
        <option>Sakit</option>
        <option>Izin</option>
        <option>Cuti</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Laporan Aktivitas</div>
    <div class="field mt">
      <label>Tindakan/Laporan yang Dilakukan</label>
      <textarea id="f-tindakan" placeholder="Uraikan tindakan yang sudah dilakukan hari ini..."></textarea>
    </div>
  </div>

  <button class="btn-submit" id="btn-kirim" onclick="submitForm()">Kirim Laporan</button>
  <div style="height:32px"></div>
</main>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  KONFIGURASI — URL WEB APP GOOGLE APPS SCRIPT
// ══════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbweXWWwUB2vSKQ3NYusggt6NFeZkrQv3NCvIHT4xPg39MVj_tU0fcJLM5yZ_11J3QRR/exec';

function toast(msg, isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isErr?' error':'');
  t.style.display='block';
  setTimeout(()=>t.style.display='none', 3000);
}

document.getElementById('f-tgl').value = new Date().toISOString().split('T')[0];

async function submitForm(){
  const nama   = document.getElementById('f-nama').value;
  const status = document.getElementById('f-status').value;
  const laporan = document.getElementById('f-tindakan').value;

  if(!nama || !status) { 
    toast('⚠️ Nama dan Status wajib diisi!', true); 
    return; 
  }

  const btn = document.getElementById('btn-kirim');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Mengirim...';

  // PAYLOAD disesuaikan dengan variabel di Apps Script
  const payload = {
    nama: nama,
    status: status,
    laporan: laporan
  };

  try {
    // Menggunakan fetch dengan mode no-cors untuk menghindari error kebijakan browser
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors', 
      cache: 'no-cache',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    toast('✅ Laporan terkirim! Silakan cek Google Sheet.');
    document.getElementById('f-tindakan').value = '';
    
  } catch (error) {
    toast('❌ Gagal: ' + error.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Kirim Laporan';
  }
}
</script>
</body>
</html>
