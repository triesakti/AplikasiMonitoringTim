<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aktivitas Harian Tim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b27;--card:#1e2540;--card2:#252d4a;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e6edf3;--muted:rgba(255,255,255,.45);--muted2:rgba(255,255,255,.65);
  --accent:#4f6ef7;--accent2:#6384ff;--green:#1D9E75;--green2:#5fd4a8;
  --yellow:#d4a017;--yellow2:#f4cc5a;--red:#c0392b;--red2:#e87070;
  --input-bg:#1a2035;--radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.shell{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{width:44px;height:44px;background:rgba(79,110,247,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.hdr-title{font-size:20px;font-weight:700;color:#fff}
.nav{display:flex;gap:10px}
.nav-btn{padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-weight:600;transition:0.3s}
.nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.main{padding:28px;max-width:1000px;margin:0 auto;width:100%}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:14px}
.field label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;font-weight:500}
.field select, .field input, .field textarea{
  width:100%;background:var(--input-bg);border:1.5px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;padding:11px 14px;outline:none;font-family:inherit;
}
.field textarea{min-height:80px;resize:vertical}
.check-group{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:10px;margin-top:10px}
.check-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted2);cursor:pointer}
.btn-submit{width:100%;background:linear-gradient(135deg,#4f6ef7,#6384ff);border:none;color:#fff;padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}

/* Stats Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:15px;margin-bottom:25px}
.stat-card{background:var(--card2);padding:20px;border-radius:var(--radius);border:1px solid var(--border2);text-align:center}
.stat-val{font-size:24px;font-weight:800;color:var(--accent2)}
.stat-lbl{font-size:12px;color:var(--muted2);margin-top:5px}

/* Progress Bar */
.progress-wrap{width:100%;height:8px;background:rgba(255,255,255,0.05);border-radius:10px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;transition:0.5s;border-radius:10px}
.prog-green{background:var(--green)}
.prog-yellow{background:var(--yellow)}
.prog-red{background:var(--red)}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:10px}
th{text-align:left;padding:12px;background:rgba(255,255,255,0.03);color:var(--muted);font-size:12px;border-bottom:1px solid var(--border)}
td{padding:12px;border-bottom:1px solid var(--border);font-size:13px}
.badge{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:700}
</style>
</head>
<body>

<div class="shell">
  <header class="hdr">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="logo">📊</div>
      <div>
        <div class="hdr-title">Monitoring Tim</div>
        <div style="font-size:12px;color:var(--muted)">Executive Dashboard</div>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" id="btn-view-form" onclick="switchView('form')">Input Laporan</button>
      <button class="nav-btn" id="btn-view-rekap" onclick="switchView('rekap')">Rekap Progress</button>
    </nav>
  </header>

  <main class="main" id="view-form">
    <div class="card">
      <div class="card-title">👤 Identitas & Kehadiran</div>
      <div class="form-grid">
        <div class="field">
          <label>Nama Staff</label>
          <select id="f-nama">
            <option value="">Pilih nama staff</option>
            <option>Bella Sintia</option><option>Irfandi Nyondri</option>
            <option>Kasmira</option><option>Salma</option>
          </select>
        </div>
        <div class="field">
          <label>Status Kehadiran</label>
          <select id="f-status">
            <option>Hadir di kantor</option><option>WFH</option>
            <option>Sakit</option><option>Izin/Cuti</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📞 Statistik Leads Hari Ini</div>
      <div class="form-grid">
        <div class="field"><label>Leads Baru</label><input type="number" id="l-baru" value="0"></div>
        <div class="field"><label>Leads di Follow-Up</label><input type="number" id="l-fu" value="0"></div>
        <div class="field"><label>Hasil Follow-Up</label><input type="number" id="l-hasil" value="0"></div>
        <div class="field"><label>Berhasil Terkonversi</label><input type="number" id="l-konv" value="0"></div>
      </div>
      <div class="field" style="margin-top:15px">
        <label>Metode Follow-Up yang digunakan</label>
        <div class="check-group">
          <label class="check-item"><input type="checkbox" name="f-metode" value="WhatsApp"> WhatsApp</label>
          <label class="check-item"><input type="checkbox" name="f-metode" value="Telepon"> Telepon</label>
          <label class="check-item"><input type="checkbox" name="f-metode" value="Email"> Email</label>
          <label class="check-item"><input type="checkbox" name="f-metode" value="Tatap Muka"> Tatap Muka</label>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">✅ Checklist Aktivitas</div>
      <div class="check-group">
        <label class="check-item"><input type="checkbox" name="f-act" value="Briefing Pagi"> Briefing Pagi</label>
        <label class="check-item"><input type="checkbox" name="f-act" value="Update Database"> Update Database</label>
        <label class="check-item"><input type="checkbox" name="f-act" value="Kunjungan Sekolah"> Kunjungan Sekolah</label>
        <label class="check-item"><input type="checkbox" name="f-act" value="Sosialisasi"> Sosialisasi</label>
      </div>
      <div class="field" style="margin-top:15px">
        <label>Tindakan yang dilakukan</label>
        <textarea id="f-tindakan" placeholder="Uraikan tindakan yang Anda lakukan hari ini..."></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🚧 Hambatan & Rencana Lanjutan</div>
      <div class="form-grid">
        <div class="field"><label>Hambatan</label><textarea id="f-hambatan" placeholder="Apa kendala Anda?"></textarea></div>
        <div class="field"><label>Rencana Lanjutan</label><textarea id="f-rencana" placeholder="Rencana untuk besok..."></textarea></div>
      </div>
    </div>

    <button class="btn-submit" id="btn-kirim" onclick="submitLaporan()">Kirim Laporan Harian</button>
  </main>

  <main class="main" id="view-rekap" style="display:none">
    <div class="stats-grid" id="global-stats">
        <div class="stat-card"><div class="stat-val" id="st-laporan">0</div><div class="stat-lbl">Total Laporan</div></div>
        <div class="stat-card"><div class="stat-val" id="st-fu">0</div><div class="stat-lbl">Total Follow-Up</div></div>
        <div class="stat-card"><div class="stat-val" id="st-konv">0</div><div class="stat-lbl">Total Konversi</div></div>
        <div class="stat-card"><div class="stat-val" id="st-pct" style="color:var(--green2)">0%</div><div class="stat-lbl">CVR Global</div></div>
    </div>

    <div class="card">
      <div class="card-title">📊 Rekap Progress Per Staff</div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Nama Staff</th>
              <th>Status</th>
              <th>Follow-Up</th>
              <th>Konversi</th>
              <th style="width:150px">Progress</th>
            </tr>
          </thead>
          <tbody id="rekap-body">
            <tr><td colspan="5" style="text-align:center">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbweXWWwUB2vSKQ3NYusggt6NFeZkrQv3NCvIHT4xPg39MVj_tU0fcJLM5yZ_11J3QRR/exec';

function switchView(v) {
  document.getElementById('view-form').style.display = v === 'form' ? 'block' : 'none';
  document.getElementById('view-rekap').style.display = v === 'rekap' ? 'block' : 'none';
  document.getElementById('btn-view-form').classList.toggle('active', v === 'form');
  document.getElementById('btn-view-rekap').classList.toggle('active', v === 'rekap');
  if(v === 'rekap') loadDataRekap();
}

async function submitLaporan() {
  const btn = document.getElementById('btn-kirim');
  const nama = document.getElementById('f-nama').value;
  if(!nama) return alert("Pilih Nama Staff!");

  const metode = Array.from(document.querySelectorAll('input[name="f-metode"]:checked')).map(i=>i.value).join(", ");
  const act = Array.from(document.querySelectorAll('input[name="f-act"]:checked')).map(i=>i.value).join(", ");

  const payload = {
    nama: nama,
    status: document.getElementById('f-status').value,
    lBaru: document.getElementById('l-baru').value,
    lFu: document.getElementById('l-fu').value,
    lHasil: document.getElementById('l-hasil').value,
    lKonv: document.getElementById('l-konv').value,
    metode: metode,
    tindakan: document.getElementById('f-tindakan').value,
    checklist: act,
    hambatan: document.getElementById('f-hambatan').value,
    rencana: document.getElementById('f-rencana').value
  };

  btn.disabled = true;
  btn.innerText = "Mengirim...";

  try {
    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    alert("✅ Laporan berhasil dikirim!");
    location.reload();
  } catch(e) {
    alert("❌ Gagal: " + e);
    btn.disabled = false;
    btn.innerText = "Kirim Laporan Harian";
  }
}

async function loadDataRekap() {
  const body = document.getElementById('rekap-body');
  body.innerHTML = '<tr><td colspan="5" style="text-align:center">Mengambil data dari Sheet...</td></tr>';
  
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    
    let totalFU = 0, totalKonv = 0;
    const staffData = {};

    data.forEach(r => {
      const n = r["Nama Staff"] || r["nama"];
      if(!n) return;
      if(!staffData[n]) staffData[n] = { fu: 0, konv: 0, status: r["Status Kehadiran"] || r["status"] };
      
      const fu = parseInt(r["Leads Follow-Up"] || r["lFu"] || 0);
      const konv = parseInt(r["Leads Konversi"] || r["lKonv"] || 0);
      
      staffData[n].fu += fu;
      staffData[n].konv += konv;
      totalFU += fu;
      totalKonv += konv;
    });

    let html = '';
    for(let name in staffData) {
      const s = staffData[name];
      const pct = s.fu > 0 ? Math.round((s.konv/s.fu)*100) : 0;
      const color = pct >= 70 ? 'prog-green' : (pct >= 40 ? 'prog-yellow' : 'prog-red');
      
      html += `<tr>
        <td><strong>${name}</strong></td>
        <td><span class="badge" style="background:rgba(255,255,255,0.05)">${s.status}</span></td>
        <td style="text-align:center">${s.fu}</td>
        <td style="text-align:center">${s.konv}</td>
        <td>
          <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px">
            <span>Progress</span><span>${pct}%</span>
          </div>
          <div class="progress-wrap"><div class="progress-bar ${color}" style="width:${pct}%"></div></div>
        </td>
      </tr>`;
    }

    body.innerHTML = html || '<tr><td colspan="5" style="text-align:center">Data belum tersedia</td></tr>';
    
    // Update Global Stats
    document.getElementById('st-laporan').innerText = data.length;
    document.getElementById('st-fu').innerText = totalFU;
    document.getElementById('st-konv').innerText = totalKonv;
    document.getElementById('st-pct').innerText = (totalFU > 0 ? Math.round((totalKonv/totalFU)*100) : 0) + "%";

  } catch(e) {
    body.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red">Gagal memuat data</td></tr>';
  }
}
</script>
</body>
</html>
