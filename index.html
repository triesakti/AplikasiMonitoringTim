<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aktivitas Harian Tim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b27;--card:#1e2540;--card2:#252d4a;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e6edf3;--muted:rgba(255,255,255,.45);--muted2:rgba(255,255,255,.65);
  --accent:#4f6ef7;--accent2:#6384ff;--green:#1D9E75;--green2:#5fd4a8;
  --input-bg:#1a2035;--radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.shell{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{width:44px;height:44px;background:rgba(79,110,247,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.hdr-title{font-size:20px;font-weight:700;color:#fff}
.main{padding:28px;max-width:820px;margin:0 auto;width:100%}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:15px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}
.field label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;font-weight:500}
.field select, .field input, .field textarea{
  width:100%;background:var(--input-bg);border:1.5px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;padding:11px 14px;outline:none;font-family:inherit;
}
.field textarea{min-height:90px;resize:vertical}
.btn-submit{width:100%;background:linear-gradient(135deg,#4f6ef7,#6384ff);border:none;color:#fff;padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-submit:disabled{opacity:0.5}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">
<header class="hdr">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="logo">📋</div>
    <div>
      <div class="hdr-title">Aktivitas Harian Tim</div>
      <div style="font-size:12px;color:var(--muted)">Sistem Pelaporan Real-Time</div>
    </div>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">Identitas</div>
    <div class="form-grid">
      <div class="field">
        <label>Nama Staff</label>
        <select id="f-nama">
            <option value="">Pilih nama staff</option>
            <option>Bella Sintia</option>
            <option>Irfandi Nyondri</option>
            <option>Kasmira</option>
            <option>Salma</option>
        </select>
      </div>
      <div class="field">
        <label>Tanggal</label>
        <input type="date" id="f-tgl">
      </div>
    </div>
    <div class="field" style="margin-top:14px">
        <label>Status Kehadiran</label>
        <select id="f-status">
          <option value="">Pilih status kehadiran</option>
          <option>Hadir di kantor</option>
          <option>WFH dengan izin Manager</option>
          <option>Sakit</option>
          <option>Izin</option>
          <option>Cuti</option>
        </select>
      </div>
  </div>

  <div class="card">
    <div class="card-title">Statistik Leads</div>
    <div class="form-grid">
      <div class="field">
        <label>Jumlah Leads Baru</label>
        <input type="number" id="l-baru" value="0">
      </div>
      <div class="field">
        <label>Leads di Follow-Up</label>
        <input type="number" id="l-fu" value="0">
      </div>
      <div class="field">
        <label>Hasil Follow-Up</label>
        <input type="number" id="l-hasil" value="0">
      </div>
      <div class="field">
        <label>Berhasil Terkonversi</label>
        <input type="number" id="l-konv" value="0">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Laporan Aktivitas</div>
    <div class="field">
      <label>Tindakan yang Dilakukan</label>
      <textarea id="f-tindakan" placeholder="Uraikan tindakan Anda..."></textarea>
    </div>
  </div>

  <button class="btn-submit" id="btn-kirim" onclick="submitForm()">Kirim Laporan</button>
  <div style="height:32px"></div>
</main>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbweXWWwUB2vSKQ3NYusggt6NFeZkrQv3NCvIHT4xPg39MVj_tU0fcJLM5yZ_11J3QRR/exec';

document.getElementById('f-tgl').value = new Date().toISOString().split('T')[0];

async function submitForm(){
  const btn = document.getElementById('btn-kirim');
  const payload = {
    nama: document.getElementById('f-nama').value,
    status: document.getElementById('f-status').value,
    laporan: document.getElementById('f-tindakan').value,
    leadsBaru: document.getElementById('l-baru').value,
    leadsFollowUp: document.getElementById('l-fu').value,
    leadsHasilFU: document.getElementById('l-hasil').value,
    leadsTerkonversi: document.getElementById('l-konv').value
  };

  if(!payload.nama || !payload.status){
    alert("Nama dan Status wajib diisi!");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Mengirim...';

  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors', 
      body: JSON.stringify(payload)
    });
    alert('✅ Laporan berhasil terkirim!');
    location.reload(); 
  } catch (error) {
    alert('❌ Terjadi kesalahan: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = 'Kirim Laporan';
  }
}
</script>
</body>
</html>
