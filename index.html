<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitoring Harian Tim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b27;--card:#1e2540;--card2:#252d4a;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e6edf3;--muted:rgba(255,255,255,.45);--muted2:rgba(255,255,255,.65);
  --accent:#4f6ef7;--accent2:#6384ff;--green:#1D9E75;--green2:#5fd4a8;
  --input-bg:#1a2035;--radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.shell{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;background:rgba(79,110,247,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.hdr-title{font-size:20px;font-weight:700;color:#fff}
.nav{display:flex;gap:10px}
.nav-btn{padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-weight:600}
.nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.main{padding:28px;max-width:900px;margin:0 auto;width:100%}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.field label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;font-weight:500}
.field select, .field input, .field textarea{
  width:100%;background:var(--input-bg);border:1.5px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;padding:11px 14px;outline:none;font-family:inherit;
}
.field textarea{min-height:80px;resize:vertical}
.check-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.check-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted2);cursor:pointer}
.check-item input{width:16px;height:16px;accent-color:var(--accent)}
.btn-submit{width:100%;background:linear-gradient(135deg,#4f6ef7,#6384ff);border:none;color:#fff;padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-submit:disabled{opacity:0.5}

/* Table Style */
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
th{text-align:left;padding:12px;background:rgba(255,255,255,0.03);color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:12px;border-bottom:1px solid var(--border)}
.badge{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:700}
.bg-green{background:rgba(29,158,117,0.2);color:var(--green2)}
</style>
</head>
<body>

<div class="shell">
  <header class="hdr">
    <div class="hdr-left">
      <div class="logo">🚀</div>
      <div>
        <div class="hdr-title">Monitoring Tim</div>
        <div style="font-size:12px;color:var(--muted)">Performance & Daily Activity</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-btn active" onclick="switchView('form')">Input</div>
      <div class="nav-btn" onclick="switchView('rekap')">Rekap</div>
    </nav>
  </header>

  <main class="main" id="view-form">
    <div class="card">
      <div class="card-title">👤 Identitas & Kehadiran</div>
      <div class="form-grid">
        <div class="field">
          <label>Nama Staff</label>
          <select id="f-nama">
            <option value="">Pilih nama staff</option>
            <option>Bella Sintia</option>
            <option>Irfandi Nyondri</option>
            <option>Kasmira</option>
            <option>Salma</option>
          </select>
        </div>
        <div class="field">
          <label>Status Kehadiran</label>
          <select id="f-status">
            <option>Hadir di kantor</option>
            <option>WFH</option>
            <option>Sakit</option>
            <option>Izin/Cuti</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📞 Statistik Leads & Follow-Up</div>
      <div class="form-grid">
        <div class="field">
          <label>Leads Baru</label>
          <input type="number" id="l-baru" value="0">
        </div>
        <div class="field">
          <label>Metode Follow-Up</label>
          <select id="f-metode">
            <option>WhatsApp</option>
            <option>Telepon</option>
            <option>Email</option>
            <option>Tatap Muka</option>
            <option>Lainnya</option>
          </select>
        </div>
        <div class="field">
          <label>Leads di Follow-Up</label>
          <input type="number" id="l-fu" value="0">
        </div>
        <div class="field">
          <label>Berhasil Terkonversi</label>
          <input type="number" id="l-konv" value="0">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">✅ Checklist Aktivitas</div>
      <div class="check-group">
        <label class="check-item"><input type="checkbox" class="f-check" value="Briefing Pagi"> Briefing Pagi</label>
        <label class="check-item"><input type="checkbox" class="f-check" value="Update Database"> Update Database</label>
        <label class="check-item"><input type="checkbox" class="f-check" value="Kunjungan Sekolah"> Kunjungan Sekolah</label>
        <label class="check-item"><input type="checkbox" class="f-check" value="Sosialisasi"> Sosialisasi</label>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📝 Laporan, Hambatan & Rencana</div>
      <div class="field">
        <label>Tindakan yang Dilakukan</label>
        <textarea id="f-tindakan" placeholder="Apa yang Anda kerjakan hari ini?"></textarea>
      </div>
      <div class="form-grid" style="margin-top:14px">
        <div class="field">
          <label>Hambatan</label>
          <textarea id="f-hambatan" placeholder="Kendala yang dihadapi..."></textarea>
        </div>
        <div class="field">
          <label>Rencana Lanjutan</label>
          <textarea id="f-rencana" placeholder="Apa rencana besok?"></textarea>
        </div>
      </div>
    </div>

    <button class="btn-submit" id="btn-kirim" onclick="submitForm()">Kirim Laporan Harian</button>
  </main>

  <main class="main" id="view-rekap" style="display:none">
    <div class="card">
      <div class="card-title">📊 Rekap Progress Terkini</div>
      <div style="overflow-x:auto">
        <table id="table-rekap">
          <thead>
            <tr>
              <th>Nama</th>
              <th>Status</th>
              <th>Leads</th>
              <th>Konversi</th>
              <th>Progress</th>
            </tr>
          </thead>
          <tbody id="rekap-body">
            <tr><td colspan="5" style="text-align:center;color:var(--muted)">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

const API_URL = '
